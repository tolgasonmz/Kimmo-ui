<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimoo — Kurye Uygulaması</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--neutral-100), transparent 60%),
      var(--neutral-50);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 40px 20px 64px; }
  .stage-head { text-align: center; }
  .stage-head h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; color: var(--neutral-900); display: flex; align-items: center; gap: 10px; justify-content: center; }
  .stage-head .badge-k { width: 34px; height: 34px; border-radius: 10px; background: var(--coral-500); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 19px; box-shadow: var(--shadow-brand); }
  .stage-head p { font-size: 14px; color: var(--neutral-500); margin: 0; }
  .stage-head a { color: var(--coral-600); font-weight: 600; text-decoration: none; }
  @keyframes kpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .screen-fade { animation: screenIn .3s cubic-bezier(0.22,1,0.36,1); }
  @keyframes screenIn { from { transform: translateY(10px); } to { transform: none; } }
  @keyframes radarPulse { 0% { transform: scale(0.3); opacity: 0.8; } 100% { transform: scale(2.2); opacity: 0; } }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #root { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="kimoo-shared.jsx"></script>
<script type="text/babel" src="courier-shared.jsx"></script>
<script type="text/babel" src="courier-screens.jsx"></script>
<script type="text/babel" src="courier-screens2.jsx"></script>
<script type="text/babel" src="courier-rewards.jsx"></script>

<script type="text/babel">
const { useState } = React;
const {
  IOSDevice, Icon,
  CourierHome, IncomingOrderScreen, ActiveDeliveryScreen,
  EarningsScreen, CourierProfileScreen, PerformanceScreen, CourierReportScreen,
  CourierRewardsScreen,
  useTweaks, TweaksPanel, TweakSection, TweakColor, TweakToggle, TweakSlider,
} = window;

const ACCENT_RAMPS = {
  '#FF5A3C': { 50:'#FFF2ED', 100:'#FFE1D6', 500:'#FF5A3C', 600:'#ED4422', 700:'#C8330F' },
  '#16A34A': { 50:'#E7F6EC', 100:'#CDEDD8', 500:'#16A34A', 600:'#128A3E', 700:'#0F7235' },
  '#0EA5E9': { 50:'#E7F6FD', 100:'#CDEBFA', 500:'#0EA5E9', 600:'#0B8FCC', 700:'#0A75A8' },
};
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

const TWEAK_DEFAULTS = {
  accent: '#FF5A3C',
  dark: false,
  radius: 1,
};

const TABS = [
  { id: 'home',    icon: 'home',    label: 'Anasayfa' },
  { id: 'earnings',icon: 'wallet',  label: 'Kazanç'   },
  { id: 'rewards', icon: 'trophy',  label: 'Ödüller'  },
  { id: 'profile', icon: 'user',    label: 'Profil'   },
];
const FLOW_SCREENS = ['incoming', 'active', 'performance', 'support'];

function TabBar({ tab, setTab }) {
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 40, paddingBottom: 22,
      background: 'var(--bg-surface)', borderTop: '1px solid var(--border-subtle)',
      display: 'flex', justifyContent: 'space-around', paddingTop: 10 }}>
      {TABS.map(t => {
        const on = tab === t.id;
        return (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '2px 16px' }}>
            <Icon name={t.icon} size={24} color={on ? 'var(--brand-500)' : 'var(--text-muted)'} strokeWidth={on ? 2.4 : 2} />
            <span style={{ fontSize: 10.5, fontWeight: on ? 700 : 600, color: on ? 'var(--brand-600)' : 'var(--text-muted)' }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('home');
  const [tab, setTabState] = useState('home');
  const [online, setOnline] = useState(true);
  const [orderPhase, setOrderPhase] = React.useState('searching');

  const toggleOnline = () => {
    setOnline(prev => {
      const next = !prev;
      if (next) setOrderPhase('searching');
      return next;
    });
  };

  React.useEffect(() => {
    if (!online || orderPhase !== 'searching' || screen !== 'home') return;
    const t = setTimeout(() => setOrderPhase('incoming'), 6000);
    return () => clearTimeout(t);
  }, [online, orderPhase, screen]);

  const ramp = ACCENT_RAMPS[t.accent] || ACCENT_RAMPS['#FF5A3C'];
  const rootVars = {
    '--brand-500': ramp[500], '--brand-600': ramp[600], '--brand-700': ramp[700],
    '--brand-50': t.dark ? hexA(ramp[500], 0.16) : ramp[50],
    '--brand-100': t.dark ? hexA(ramp[500], 0.26) : ramp[100],
    '--radius-scale': t.radius,
    width: '100%',
  };

  const go = (s) => setScreen(s);
  const setTab = (id) => { setTabState(id); setScreen(id); };
  const inFlow = FLOW_SCREENS.includes(screen);

  let view;
  switch (screen) {
    case 'home': view = <CourierHome go={go} online={online} toggleOnline={toggleOnline} orderPhase={online ? orderPhase : 'offline'} onAcceptOrder={() => setOrderPhase('active')} onRejectOrder={() => setOrderPhase('searching')} />; break;
    case 'earnings': view = <EarningsScreen go={go} />; break;
    case 'profile': view = <CourierProfileScreen go={go} />; break;
    case 'rewards': view = <CourierRewardsScreen go={go} />; break;
    case 'incoming': view = <IncomingOrderScreen go={go} onAccept={() => { setOrderPhase('active'); go('active'); }} onReject={() => go('home')} />; break;
    case 'active': view = <ActiveDeliveryScreen go={go} />; break;
    case 'performance': view = <PerformanceScreen go={go} />; break;
    case 'support': view = <CourierReportScreen go={go} />; break;
    default: view = <CourierHome go={go} online={online} setOnline={setOnline} />;
  }

  return (
    <div className="stage">
      <div className="stage-head">
        <h1><span className="badge-k">k</span> Kimoo · Kurye Uygulaması</h1>
        <p>Sipariş kabul → navigasyon → teslimat · <a href="Design System.html">Design System</a> · <a href="index.html">Genel bakış</a></p>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 10, flexWrap: 'wrap' }}>
          {[['home','Anasayfa'],['incoming','Gelen Sipariş'],['active','Aktif Teslimat'],['earnings','Kazançlar'],['rewards','Ödüller'],['performance','Performans']].map(([s,l]) => (
            <button key={s} onClick={() => setScreen(s)} style={{ padding: '7px 14px', borderRadius: 999, fontSize: 13, fontWeight: 600, border: '1.5px solid #E5E0DA', background: '#fff', color: '#5D554E', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={rootVars} data-theme={t.dark ? 'dark' : 'light'}>
        <IOSDevice dark={t.dark} width={390} height={844}>
          <div style={{ position: 'relative', height: 844, background: 'var(--bg-app)', overflow: 'hidden' }}>
            <div key={screen} className="screen-fade" style={{ height: 844, overflowY: 'auto', background: 'var(--bg-app)' }}>
              {view}
            </div>
            {!inFlow && <TabBar tab={tab} setTab={setTab} />}
          </div>
        </IOSDevice>
      </div>

      <TweaksPanel>
        <TweakSection label="Görünüm" />
        <TweakColor label="Vurgu rengi" value={t.accent} options={Object.keys(ACCENT_RAMPS)} onChange={v => setTweak('accent', v)} />
        <TweakToggle label="Koyu mod" value={t.dark} onChange={v => setTweak('dark', v)} />
        <TweakSlider label="Köşe yuvarlaklığı" value={t.radius} min={0} max={1.7} step={0.1} onChange={v => setTweak('radius', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
