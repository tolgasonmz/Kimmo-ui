<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimoo — Müşteri Uygulaması</title>
<link rel="stylesheet" href="tokens.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--neutral-100), transparent 60%),
      var(--neutral-50);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .stage { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 22px; padding: 40px 20px 64px; min-height: 100vh; }
  .stage-head { text-align: center; }
  .stage-head h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; color: var(--neutral-900); display: flex; align-items: center; gap: 10px; justify-content: center; }
  .stage-head .badge-k { width: 34px; height: 34px; border-radius: 10px; background: var(--coral-500); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 19px; box-shadow: var(--shadow-brand); }
  .stage-head p { font-size: 14px; color: var(--neutral-500); margin: 0; }
  .stage-head a { color: var(--coral-600); font-weight: 600; text-decoration: none; }
  @keyframes kpulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  .screen-fade { animation: screenIn .3s cubic-bezier(0.22,1,0.36,1); }
  @keyframes screenIn { from { transform: translateY(10px); } to { transform: none; } }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #root { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="kimoo-theme.jsx"></script>
<script type="text/babel" src="kimoo-shared.jsx"></script>
<script type="text/babel" src="kimoo-screens.jsx"></script>
<script type="text/babel" src="kimoo-screens2.jsx"></script>
<script type="text/babel" src="kimoo-tabs.jsx"></script>
<script type="text/babel" src="kimoo-onboarding.jsx"></script>
<script type="text/babel" src="kimoo-extras.jsx"></script>
<script type="text/babel" src="kimoo-detail-screens.jsx"></script>

<script type="text/babel">
const { useState } = React;
const {
  IOSDevice, Icon, PRODUCT_OPTIONS, RESTAURANTS,
  HomeScreen, RestaurantScreen, ProductScreen, CartScreen, CheckoutScreen, TrackingScreen,
  SearchScreen, OrdersScreen, FavoritesScreen, ProfileScreen,
  SplashScreen, WelcomeScreen, LoginScreen, OTPScreen, LocationScreen,
  ReviewScreen, RestaurantReviewsScreen, ReportScreen, ReferralScreen,
  AddressScreen, WalletScreen, CouponsScreen, NotificationsScreen, AccountSettingsScreen,
  useTweaks, TweaksPanel, TweakSection, TweakColor, TweakToggle, TweakSlider, TweakRadio,
} = window;

const ACCENT_RAMPS = {
  '#FF5A3C': { 50:'#FFF2ED', 100:'#FFE1D6', 500:'#FF5A3C', 600:'#ED4422', 700:'#C8330F' },
  '#E11D48': { 50:'#FFF1F3', 100:'#FFE2E7', 500:'#E11D48', 600:'#C01640', 700:'#9F1239' },
  '#16A34A': { 50:'#E7F6EC', 100:'#CDEDD8', 500:'#16A34A', 600:'#128A3E', 700:'#0F7235' },
  '#7C3AED': { 50:'#F3EDFE', 100:'#E6D9FC', 500:'#7C3AED', 600:'#6B27D6', 700:'#5A1FB8' },
  '#0EA5E9': { 50:'#E7F6FD', 100:'#CDEBFA', 500:'#0EA5E9', 600:'#0B8FCC', 700:'#0A75A8' },
};
const FONTS = {
  'Plus Jakarta Sans': "'Plus Jakarta Sans', system-ui, sans-serif",
  'DM Sans': "'DM Sans', system-ui, sans-serif",
  'Sistem': "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif",
};
function hexA(hex, a) {
  const n = parseInt(hex.slice(1), 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#FF5A3C",
  "font": "Sistem",
  "dark": false,
  "radius": 0
}/*EDITMODE-END*/;

const TABS = [
  { id: 'home', icon: 'home', label: 'Anasayfa' },
  { id: 'search', icon: 'search', label: 'Ara' },
  { id: 'orders', icon: 'bag', label: 'Siparişler' },
  { id: 'favorites', icon: 'heart', label: 'Favoriler' },
  { id: 'profile', icon: 'user', label: 'Profil' },
];
const FLOW = ['restaurant', 'product', 'cart', 'checkout', 'tracking', 'review', 'reviews', 'report', 'referral', 'addresses', 'wallet', 'coupons', 'notifications', 'settings'];
const ONBOARD = ['splash', 'welcome', 'login', 'otp', 'location'];

function TabBar({ tab, setTab, cartCount }) {
  return (
    <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 40, paddingBottom: 22,
      background: 'var(--bg-surface)', borderTop: '1px solid var(--border-subtle)',
      display: 'flex', justifyContent: 'space-around', paddingTop: 10 }}>
      {TABS.map(t => {
        const on = tab === t.id;
        return (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, padding: '2px 12px', position: 'relative' }}>
            <Icon name={t.icon} size={24} color={on ? 'var(--brand-500)' : 'var(--text-muted)'} strokeWidth={on ? 2.4 : 2} />
            <span style={{ fontSize: 10.5, fontWeight: on ? 700 : 600, color: on ? 'var(--brand-600)' : 'var(--text-muted)' }}>{t.label}</span>
            {t.id === 'orders' && cartCount > 0 && (
              <span style={{ position: 'absolute', top: -2, right: 6, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 999, background: 'var(--brand-500)', color: '#fff', fontSize: 10, fontWeight: 800, display: 'grid', placeItems: 'center' }}>{cartCount}</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div style={{ position: 'absolute', bottom: 96, left: 16, right: 16, zIndex: 60, display: 'flex', justifyContent: 'center', pointerEvents: 'none' }}>
      <div className="screen-fade" style={{ background: 'var(--bg-inverse)', color: 'var(--text-inverse)', padding: '12px 18px', borderRadius: 999, fontSize: 14, fontWeight: 600, boxShadow: 'var(--shadow-lg)', display: 'flex', alignItems: 'center', gap: 8 }}>
        <Icon name="check" size={16} color="var(--success-500)" />{msg}
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  // Onboarding state — check localStorage to skip if already done
  const didOnboard = React.useMemo(() => { try { return localStorage.getItem('kimoo-onboarded') === '1'; } catch(e){ return false; } }, []);
  const [screen, setScreen] = useState(didOnboard ? 'home' : 'splash');
  const [tab, setTabState] = useState('home');
  const [restaurant, setRestaurant] = useState(RESTAURANTS[0]);
  const [product, setProduct] = useState(null);
  const [cart, setCart] = useState([]);
  const [hasActive, setHasActive] = useState(false);
  const [lastOrder, setLastOrder] = useState({ contactless: false, code: '4827' });
  const [toast, setToast] = useState('');
  const [phone, setPhone] = useState('');

  useKimooTheme(t.dark, (v) => setTweak('dark', v));

  const finishOnboarding = () => { try { localStorage.setItem('kimoo-onboarded', '1'); } catch(e){} setScreen('home'); };

  const ramp = ACCENT_RAMPS[t.accent] || ACCENT_RAMPS['#FF5A3C'];
  const rootVars = {
    '--brand-500': ramp[500], '--brand-600': ramp[600],
    '--brand-700': t.dark ? ramp[500] : ramp[700],
    '--brand-50':  t.dark ? hexA(ramp[500], 0.14) : ramp[50],
    '--brand-100': t.dark ? hexA(ramp[500], 0.22) : ramp[100],
    '--radius-scale': t.radius,
    '--font-sans': FONTS[t.font] || FONTS['Plus Jakarta Sans'],
    width: '100%',
  };

  const showToast = (m) => { setToast(m); clearTimeout(window.__kt); window.__kt = setTimeout(() => setToast(''), 1800); };
  const go = (s) => setScreen(s);
  const setTab = (id) => { setTabState(id); setScreen(id); };

  const openRestaurant = (r) => { setRestaurant(r); setScreen('restaurant'); };
  const openProduct = (m) => { setProduct(m); setScreen('product'); };

  const optLabelFor = (sel) => {
    const parts = [];
    const sz = PRODUCT_OPTIONS.size.items.find(i => i.id === sel.size); if (sz && sz.id !== 'tek') parts.push(sz.label);
    const sp = PRODUCT_OPTIONS.spice.items.find(i => i.id === sel.spice); if (sp) parts.push(sp.label);
    (sel.extras || []).forEach(id => { const it = PRODUCT_OPTIONS.extras.items.find(i => i.id === id); if (it) parts.push(it.label); });
    return parts.length ? parts.join(' · ') : 'Standart';
  };
  const addToCart = (prod, sel, qty, unit) => {
    setCart(c => [...c, { name: prod.name, unit, qty, optLabel: optLabelFor(sel) }]);
    setScreen('cart');
  };
  const addQuick = (m) => { setCart(c => [...c, { name: m.name, unit: m.price, qty: 1, optLabel: 'Standart' }]); showToast('Sepete eklendi'); };
  const updateQty = (i, d) => setCart(c => c.map((it, idx) => idx === i ? { ...it, qty: Math.max(1, it.qty + d) } : it));
  const removeItem = (i) => setCart(c => c.filter((_, idx) => idx !== i));
  const placeOrder = (opts = {}) => {
    const code = String(Math.floor(1000 + Math.random() * 9000));
    setLastOrder({ contactless: !!opts.contactless, code });
    setHasActive(true); setCart([]); setScreen('tracking');
  };
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const inFlow = FLOW.includes(screen) || ONBOARD.includes(screen);
  let view;
  switch (screen) {
    case 'home': view = <HomeScreen go={go} openRestaurant={openRestaurant} cartCount={cartCount} />; break;
    case 'search': view = <SearchScreen openRestaurant={openRestaurant} />; break;
    case 'orders': view = <OrdersScreen go={go} hasActive={hasActive} openTracking={() => setScreen('tracking')} openReview={() => setScreen('review')} />; break;
    case 'favorites': view = <FavoritesScreen openRestaurant={openRestaurant} />; break;
    case 'profile': view = <ProfileScreen go={go} />; break;
    case 'restaurant': view = <RestaurantScreen restaurant={restaurant} go={go} openProduct={openProduct} addQuick={addQuick} openReviews={() => setScreen('reviews')} />; break;
    case 'product': view = <ProductScreen product={product} go={go} addToCart={addToCart} />; break;
    case 'cart': view = <CartScreen cart={cart} go={go} updateQty={updateQty} removeItem={removeItem} restaurant={restaurant} />; break;
    case 'checkout': view = <CheckoutScreen cart={cart} go={go} restaurant={restaurant} placeOrder={placeOrder} hasOnlineHistory={true} />; break;
    case 'tracking': view = <TrackingScreen go={() => { setScreen('home'); setTabState('home'); }} restaurant={restaurant} contactless={lastOrder.contactless} code={lastOrder.code} />; break;
    // onboarding
    case 'splash': view = <SplashScreen onDone={() => setScreen('welcome')} />; break;
    case 'welcome': view = <WelcomeScreen onDone={() => setScreen('login')} />; break;
    case 'login': view = <LoginScreen onSubmit={(p) => { setPhone(p); setScreen('otp'); }} />; break;
    case 'otp': view = <OTPScreen phone={phone} onVerify={() => setScreen('location')} onBack={() => setScreen('login')} />; break;
    case 'location': view = <LocationScreen onAllow={finishOnboarding} />; break;
    // extras
    case 'review': view = <ReviewScreen go={go} />; break;
    case 'reviews': view = <RestaurantReviewsScreen go={go} restaurant={restaurant} />; break;
    case 'report': view = <ReportScreen go={go} />; break;
    case 'referral': view = <ReferralScreen go={go} />; break;
    case 'addresses': view = <AddressScreen go={go} />; break;
    case 'wallet': view = <WalletScreen go={go} />; break;
    case 'coupons': view = <CouponsScreen go={go} />; break;
    case 'notifications': view = <NotificationsScreen go={go} />; break;
    case 'settings': view = <AccountSettingsScreen go={go} />; break;
    default: view = <HomeScreen go={go} openRestaurant={openRestaurant} cartCount={cartCount} />;
  }

  // floating cart button (visible on restaurant browse when items exist)
  const showCartFab = screen === 'restaurant' && cartCount > 0;

  return (
    <div className="stage">
      <div className="stage-head">
        <h1><span className="badge-k">k</span> Kimoo · Müşteri Uygulaması</h1>
        <p>Keşfet → sipariş → canlı takip · <a href="Design System.html">Design System</a> · <a href="index.html">Genel bakış</a></p>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginTop: 10, flexWrap: 'wrap' }}>
          {[['splash','Onboarding'],['review','Değerlendir'],['report','Sorun Bildir'],['referral','Davet Et']].map(([s,l]) => (
            <button key={s} onClick={() => setScreen(s)} style={{ padding: '7px 14px', borderRadius: 999, fontSize: 13, fontWeight: 600, border: '1.5px solid #E5E0DA', background: '#fff', color: '#5D554E', cursor: 'pointer', fontFamily: 'var(--font-sans)' }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={rootVars} data-theme={t.dark ? 'dark' : 'light'}>
        <IOSDevice dark={t.dark} width={390} height={844}>
          <div style={{ position: 'relative', height: 844, background: 'var(--bg-app)', overflow: 'hidden' }}>
            <div key={screen} className="screen-fade" style={{ height: 844, overflowY: 'auto', background: 'var(--bg-app)' }}>
              {view}
            </div>
            {showCartFab && (
              <div style={{ position: 'absolute', bottom: 24, left: 16, right: 16, zIndex: 45 }}>
                <button onClick={() => setScreen('cart')} style={{ width: '100%', background: 'var(--brand-500)', color: '#fff', border: 'none', borderRadius: 999, padding: '15px 20px', fontSize: 16, fontWeight: 700, cursor: 'pointer', boxShadow: 'var(--shadow-brand)', display: 'flex', alignItems: 'center', gap: 10, fontFamily: 'var(--font-sans)' }}>
                  <span style={{ background: 'rgba(255,255,255,0.25)', borderRadius: 999, minWidth: 24, height: 24, display: 'grid', placeItems: 'center', fontSize: 13, fontWeight: 800 }}>{cartCount}</span>
                  <span style={{ flex: 1, textAlign: 'left' }}>Sepete git</span>
                  <Icon name="chevR" size={18} color="#fff" />
                </button>
              </div>
            )}
            <Toast msg={toast} />
            {!inFlow && <TabBar tab={tab} setTab={setTab} cartCount={cartCount} />}
          </div>
        </IOSDevice>
      </div>

      <TweaksPanel>
        <TweakSection label="Marka" />
        <TweakColor label="Vurgu rengi" value={t.accent} options={Object.keys(ACCENT_RAMPS)} onChange={v => setTweak('accent', v)} />
        <TweakRadio label="Yazı tipi" value={t.font} options={Object.keys(FONTS)} onChange={v => setTweak('font', v)} />
        <TweakSection label="Görünüm" />
        <TweakToggle label="Koyu mod" value={t.dark} onChange={v => setTweak('dark', v)} />
        <TweakSlider label="Köşe yuvarlaklığı" value={t.radius} min={0} max={1.7} step={0.1} onChange={v => setTweak('radius', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
