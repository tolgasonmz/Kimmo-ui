<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimoo — Süper Admin Dashboard</title>
<link rel="stylesheet" href="tokens.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--neutral-50);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .admin-stage { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 32px 20px 48px; }
  .admin-head { text-align: center; }
  .admin-head h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 6px; color: var(--neutral-900); display: flex; align-items: center; gap: 10px; justify-content: center; }
  .admin-head .badge-k { width: 34px; height: 34px; border-radius: 10px; background: var(--coral-500); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 19px; box-shadow: var(--shadow-brand); }
  .admin-head p { font-size: 14px; color: var(--neutral-500); margin: 0; }
  .admin-head a { color: var(--coral-600); font-weight: 600; text-decoration: none; }
  .nav-chips { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
  .nav-chip { padding: 7px 14px; border-radius: 999px; font-size: 13px; font-weight: 600; border: 1.5px solid #E5E0DA; background: #fff; color: #5D554E; cursor: pointer; font-family: var(--font-sans); transition: border-color .12s ease; }
  .nav-chip:hover { border-color: #ABA299; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  #root { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="kimoo-shared.jsx"></script>
<script type="text/babel" src="resto-data.jsx"></script>
<script type="text/babel" src="admin-data.jsx"></script>
<script type="text/babel" src="admin-views.jsx"></script>
<script type="text/babel" src="admin-views2.jsx"></script>

<script type="text/babel">
const { useState } = React;
const {
  ChromeWindow, AdminSideNav,
  AdminDashboard, AdminRestaurants, AdminCustomers, AdminCouriers,
  AdminFinance, AdminCampaigns, AdminNotifications, AdminRoles, AdminAudit, AdminConfig, AdminReports,
  useTweaks, TweaksPanel, TweakSection, TweakToggle, TweakSlider,
} = window;

const TWEAK_DEFAULTS = { dark: false, radius: 1 };

const URL_MAP = {
  dashboard: 'admin.kimoo.com/dashboard',
  restaurants: 'admin.kimoo.com/restaurants',
  customers: 'admin.kimoo.com/customers',
  couriers: 'admin.kimoo.com/couriers',
  finance: 'admin.kimoo.com/finance',
  campaigns: 'admin.kimoo.com/campaigns',
  notifications: 'admin.kimoo.com/notifications',
  roles: 'admin.kimoo.com/roles',
  audit: 'admin.kimoo.com/audit',
  config: 'admin.kimoo.com/config',
  reports: 'admin.kimoo.com/reports',
};

const NAV_BUTTONS = [
  ['dashboard', 'Genel Bakış'], ['restaurants', 'Restoranlar'], ['customers', 'Müşteriler'],
  ['couriers', 'Kuryeler'], ['reports', 'Raporlar'], ['finance', 'Finans'], ['campaigns', 'Kampanyalar'],
  ['roles', 'Roller'], ['audit', 'Denetim'], ['config', 'Ayarlar'],
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = useState('dashboard');

  const rootVars = { '--radius-scale': t.radius, width: '100%' };

  let view;
  switch (page) {
    case 'dashboard': view = <AdminDashboard />; break;
    case 'restaurants': view = <AdminRestaurants />; break;
    case 'customers': view = <AdminCustomers />; break;
    case 'couriers': view = <AdminCouriers />; break;
    case 'reports': view = <AdminReports />; break;
    case 'finance': view = <AdminFinance />; break;
    case 'campaigns': view = <AdminCampaigns />; break;
    case 'notifications': view = <AdminNotifications />; break;
    case 'roles': view = <AdminRoles />; break;
    case 'audit': view = <AdminAudit />; break;
    case 'config': view = <AdminConfig />; break;
    default: view = <AdminDashboard />;
  }

  return (
    <div className="admin-stage">
      <div className="admin-head">
        <h1><span className="badge-k">k</span> Kimoo · Süper Admin</h1>
        <p>Platform yönetim merkezi · <a href="Design System.html">Design System</a> · <a href="index.html">Genel bakış</a></p>
        <div className="nav-chips">
          {NAV_BUTTONS.map(([s, l]) => (
            <button key={s} className="nav-chip" onClick={() => setPage(s)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={rootVars} data-theme={t.dark ? 'dark' : 'light'}>
        <ChromeWindow width={1280} height={780} url={URL_MAP[page] || 'admin.kimoo.com'}>
          <div style={{ display: 'flex', height: '100%', background: 'var(--bg-app)' }}>
            <AdminSideNav active={page} onNav={setPage} />
            <div style={{ flex: 1, overflow: 'auto' }}>
              {view}
            </div>
          </div>
        </ChromeWindow>
      </div>

      <TweaksPanel>
        <TweakSection label="Görünüm" />
        <TweakToggle label="Koyu mod" value={t.dark} onChange={v => setTweak('dark', v)} />
        <TweakSlider label="Köşe yuvarlaklığı" value={t.radius} min={0} max={1.7} step={0.1} onChange={v => setTweak('radius', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
